name: publish

# Publishes org.saiku:saiku-query:0.4-SNAPSHOT to GitHub Packages on every
# push to master (snapshots are mutable so each push re-deploys). Triggers
# also on workflow_dispatch for manual republishes. Switch the trigger to
# tag-push when a release version is cut.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # saiku-query's pom resolves transitives from spiculedata/mondrian-saiku
      # and spiculedata/olap4j, plus deploys to spiculedata/saiku-query —
      # three distinct GH Packages URLs. Write the settings.xml directly so
      # all three <server> ids share the auto-issued GITHUB_TOKEN.
      - name: Configure Maven settings.xml
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server><id>github</id><username>${GH_ACTOR}</username><password>${GH_TOKEN}</password></server>
              <server><id>github-mondrian-saiku</id><username>${GH_ACTOR}</username><password>${GH_TOKEN}</password></server>
              <server><id>github-olap4j</id><username>${GH_ACTOR}</username><password>${GH_TOKEN}</password></server>
            </servers>
          </settings>
          EOF

      - name: Deploy to GitHub Packages
        # -Dmaven.test.skip=true (not just -DskipTests) avoids compiling
        # the test sources, which still reference an inlined Mondrian
        # internal class that was removed in mondrian-4.8.1.0.
        run: >
          mvn -B -ntp -Dmaven.test.skip=true deploy
          -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}
